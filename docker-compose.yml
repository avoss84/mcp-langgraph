services:
  mcp-client:
    build:
      context: .
      dockerfile: Dockerfile.client
    pull_policy: build
    image: mcp-client:latest
    platform: linux/amd64
    ports:
      - "8081:8080"         # Expose port 8080 of the container on port 8081 of the host
    environment:
      - GOOGLE_APPLICATION_CREDENTIALS=/your_path/application_default_credentials.json
      - GOOGLE_CLOUD_PROJECT=your_project_gcp_id
    depends_on:
      - mcp-server
    networks:
      - ai-network
    volumes:
      - your_path/application_default_credentials.json

  mcp-server:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: mcp-server-1 
    pull_policy: build
    image: mcp-server:latest
    platform: linux/amd64
    stdin_open: true  # Enable interactive mode for stdio
    tty: true         # Allocate a pseudo-TTY
    networks:
      - ai-network
    volumes:
      - your_path/application_default_credentials.json

  chat-ui:
    build:
      context: .
      dockerfile: Dockerfile.ui
    pull_policy: build
    image: chat-ui:latest
    platform: linux/amd64
    ports:
      - "5001:8081"         # Expose Streamlit on port 5001 (to avoid conflict with MCP client)
    environment:
      - GOOGLE_APPLICATION_CREDENTIALS=/your_path/application_default_credentials.json
      - GOOGLE_CLOUD_PROJECT=your_project_gcp_id
    depends_on:
      - mcp-client
    networks:
      - ai-network
    volumes:
      - your_path/.config/gcloud/application_default_credentials.json

networks:
  ai-network:
    driver: bridge